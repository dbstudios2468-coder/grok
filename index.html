<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nexus | MultiGPT</title>
    
    <link rel="preconnect" href="https://image.pollinations.ai" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent: #00ff88; 
            --accent-glow: rgba(0, 255, 136, 0.3);
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-blur: 60px;
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow-heavy: 0 40px 100px rgba(0,0,0,0.8);
            --tx: 0px; --ty: 0px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* --- THE LIQUID BACKGROUND --- */
        #bg-canvas { 
            position: fixed; inset: -10%; z-index: -3; 
            background-image: radial-gradient(circle at 20% 30%, #004d33, transparent 40%), radial-gradient(circle at 80% 70%, #002244, transparent 50%);
            filter: blur(var(--glass-blur)) saturate(180%); 
            transform: translate(var(--tx), var(--ty)); 
            transition: transform 0.2s ease-out;
        }

        .nexus-wrapper { width: 94vw; height: 88vh; max-width: 1100px; display: flex; flex-direction: column; z-index: 10; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .ios-panel {
            flex: 1; background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur)) saturate(160%);
            border-radius: 35px; border: 1px solid var(--glass-border); border-top: 1px solid rgba(255,255,255,0.2);
            box-shadow: var(--shadow-heavy); display: flex; flex-direction: column; overflow: hidden;
        }

        .panel-header { padding: 20px 30px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
        .sys-title { font-weight: 900; letter-spacing: 2px; color: var(--accent); font-size: 0.9rem; }

        #view { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
        
        /* Message Bubbles */
        .bubble-wrap { display: flex; flex-direction: column; max-width: 85%; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bubble-wrap.me { align-self: flex-end; }
        .bubble-wrap.them { align-self: flex-start; }
        .bubble { padding: 14px 22px; border-radius: 22px; font-size: 1.05rem; line-height: 1.5; }
        .me .bubble { background: var(--accent); color: #000; font-weight: 600; border-bottom-right-radius: 4px; box-shadow: 0 10px 20px var(--accent-glow); }
        .them .bubble { background: rgba(255,255,255,0.07); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Input area */
        .input-dock { padding: 20px 30px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--glass-border); }
        .input-pill { display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius: 100px; padding: 8px 10px 8px 25px; border: 1px solid var(--glass-border); }
        .input-pill input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1.05rem; }
        .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; color: #000; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }

        .loading-text { font-size: 0.8rem; opacity: 0.5; margin-left: 30px; margin-bottom: 10px; display: none; }

        /* Dock */
        .dock { position: fixed; bottom: 20px; display: flex; gap: 12px; background: rgba(20,20,20,0.7); backdrop-filter: blur(20px); padding: 10px 20px; border-radius: 100px; border: 1px solid var(--glass-border); box-shadow: var(--shadow-heavy); }
        .dock-btn { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.05); }
        .dock-btn:hover { background: var(--accent); color: black; transform: translateY(-3px); }

        img.chat-img { width: 100%; border-radius: 18px; margin-top: 10px; border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body onmousemove="parallax(event)">
    <div id="bg-canvas"></div>

    <div class="nexus-wrapper">
        <main class="ios-panel">
            <div class="panel-header">
                <span class="sys-title">MultiGPT // DIRECT ENGINE</span>
                <i class="fas fa-satellite-dish" style="color: var(--accent); font-size: 0.8rem;"></i>
            </div>
            <div id="view"></div>
            <div id="loading" class="loading-text"><i class="fas fa-spinner fa-spin"></i> ANALYZING...</div>
            <div class="input-dock">
                <div class="input-pill">
                    <input type="text" id="msg-input" placeholder="Message MultiGPT..." autocomplete="off" onkeypress="if(event.key==='Enter') push()">
                    <button class="send-btn" id="send-btn" onclick="push()"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </main>
    </div>

    <div class="dock">
        <div class="dock-btn" onclick="document.getElementById('bg-up').click()"><i class="fas fa-image"></i></div>
        <div class="dock-btn" onclick="clearMem()"><i class="fas fa-trash"></i></div>
        <div class="dock-btn" onclick="window.location.href='https://google.com'"><i class="fas fa-shield"></i></div>
    </div>

    <input type="file" id="bg-up" hidden accept="image/*" onchange="updateBg(this)">

    <script>
        const input = document.getElementById('msg-input');
        const view = document.getElementById('view');
        const loading = document.getElementById('loading');
        const sendBtn = document.getElementById('send-btn');
        let mem = JSON.parse(localStorage.getItem('multigpt_direct_mem_v2')) || [];

        window.onload = () => {
            const savedBg = localStorage.getItem('nx_bg');
            if(savedBg) document.getElementById('bg-canvas').style.backgroundImage = `url(${savedBg})`;
            if(mem.length === 0) {
                addBubble('MultiGPT', 'Direct encrypted link established. I am ready.');
            } else {
                mem.forEach(m => addBubble(m.role === 'user' ? 'You' : 'MultiGPT', m.content, true));
            }
        };

        function parallax(e) {
            const x = (window.innerWidth / 2 - e.clientX) / 50;
            const y = (window.innerHeight / 2 - e.clientY) / 50;
            document.documentElement.style.setProperty('--tx', x + 'px');
            document.documentElement.style.setProperty('--ty', y + 'px');
        }

        function updateBg(fileInput) {
            if(fileInput.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    document.getElementById('bg-canvas').style.backgroundImage = `url(${e.target.result})`;
                    localStorage.setItem('nx_bg', e.target.result);
                };
                r.readAsDataURL(fileInput.files[0]);
            }
        }

        function clearMem() { 
            if(confirm("Wipe conversation history?")) {
                localStorage.removeItem('multigpt_direct_mem_v2'); mem = []; view.innerHTML = ''; 
                addBubble('MultiGPT', 'Memory purged.');
            }
        }

        async function push() {
            const val = input.value.trim(); if(!val) return;
            input.value = ''; 
            addBubble('You', val, true);
            mem.push({role: 'user', content: val});
            
            loading.style.display = 'block';
            input.disabled = true;

            try {
                if(val.toLowerCase().includes('draw') || val.toLowerCase().includes('image') || val.toLowerCase().includes('picture')) {
                    const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(val)}?width=1024&height=1024&model=flux&nologo=true&seed=${Math.random()}`;
                    addBubble('MultiGPT', `<img src="${imgUrl}" class="chat-img">`, true);
                    mem.push({role: 'assistant', content: "[Image Generated]"});
                } else {
                    const res = await fetch("https://text.pollinations.ai/", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [
                                {role:'system', content:'You are MultiGPT. Concise, intelligent, and helpful. DO NOT output JSON formatting or internal reasoning steps.'}, 
                                ...mem.slice(-5)
                            ],
                            model: "openai" 
                        })
                    });
                    
                    let text = await res.text();

                    // --- THE GLITCH SCRUBBER ---
                    if (text.includes("reasoning_content") || text.startsWith("{")) {
                        try {
                            const parsed = JSON.parse(text);
                            text = parsed.content || (parsed.choices && parsed.choices[0].message.content) || text;
                        } catch(e) {
                            // Fallback string manipulation if JSON is malformed
                            if (text.includes('"content":"')) {
                                text = text.split('"content":"')[1].split('","')[0].replace(/\\n/g, '\n').replace(/\\"/g, '"');
                            }
                        }
                    }

                    const bubbleElement = addBubble('MultiGPT', '');
                    const bubbleContent = bubbleElement.querySelector('.bubble');
                    let i = 0;
                    const speed = 12; // Typewriter speed
                    
                    function typeEffect() {
                        if (i < text.length) {
                            bubbleContent.innerText += text.charAt(i);
                            i++;
                            view.scrollTop = view.scrollHeight;
                            setTimeout(typeEffect, speed);
                        }
                    }
                    typeEffect();

                    mem.push({role: 'assistant', content: text});
                }
                localStorage.setItem('multigpt_direct_mem_v2', JSON.stringify(mem.slice(-15)));
            } catch (e) {
                addBubble('SYSTEM', `Error: ${e.message}`, true);
            } finally {
                loading.style.display = 'none';
                input.disabled = false;
                input.focus();
            }
        }

        function addBubble(u, c, skipTypewriter = false) {
            const div = document.createElement('div');
            div.className = `bubble-wrap ${u === 'You' ? 'me' : 'them'}`;
            div.innerHTML = `<div style="font-size:0.65rem; margin-bottom:4px; opacity:0.5; padding-left:10px;">${u.toUpperCase()}</div><div class="bubble">${skipTypewriter ? c : ''}</div>`;
            view.appendChild(div); 
            view.scrollTop = view.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
