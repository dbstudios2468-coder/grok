<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiGPT | DeepSeek Hyper-Liquid</title>
    
    <link rel="preconnect" href="https://image.pollinations.ai" crossorigin>

    <style>
        /* --- HYPER-LIQUID VARIABLES --- */
        :root { 
            --glass-bg: rgba(255, 255, 255, 0.02); 
            --glass-refraction: rgba(255, 255, 255, 0.2);
            --glass-shadow: rgba(0, 0, 0, 0.8);
            --accent: #00d4ff; /* Changed to DeepSeek Blue */
            --accent-glow: rgba(0, 212, 255, 0.5);
            --text-main: #ffffff;
        }

        /* --- VISCOUS MESH BACKGROUND --- */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #030303;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 40, 60, 0.8), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(0, 20, 50, 0.6), transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(0, 60, 40, 0.7), transparent 60%);
            background-size: 200% 200%;
            animation: viscousFlow 18s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            color: var(--text-main); 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
            perspective: 1000px;
        }

        @keyframes viscousFlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 50%; }
        }

        /* --- THE HEAVY GLASS PANE --- */
        #shell { 
            width: 92vw; height: 90vh; max-width: 1200px;
            background: var(--glass-bg); 
            backdrop-filter: blur(65px) saturate(250%); 
            -webkit-backdrop-filter: blur(65px) saturate(250%); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 40px; 
            display: flex; flex-direction: column; 
            box-shadow: 
                0 40px 120px var(--glass-shadow), 
                inset 0 1px 2px var(--glass-refraction),
                inset 0 -1px 2px rgba(255,255,255,0.02),
                inset 0 0 60px rgba(255,255,255,0.02); 
            position: relative;
            transform-style: preserve-3d;
        }

        #shell::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 30%, transparent 70%, rgba(255,255,255,0.03) 100%);
            border-radius: inherit; pointer-events: none; z-index: 10;
        }
        
        #top-bar {
            padding: 22px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            background: rgba(0,0,0,0.1);
            border-top-left-radius: 40px; border-top-right-radius: 40px;
            position: relative; z-index: 11;
        }

        .sys-title { font-weight: 900; letter-spacing: 5px; font-size: 0.8rem; opacity: 0.9; text-shadow: 0 0 20px var(--accent-glow); color: var(--accent); }
        
        #clear-btn {
            background: rgba(255,255,255,0.03); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 22px; border-radius: 30px; font-size: 0.75rem; cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); font-weight: 700; letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }
        #clear-btn:hover { background: rgba(0,212,255,0.15); border-color: var(--accent); box-shadow: 0 0 25px var(--accent-glow); transform: translateY(-1px); }

        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        #chat { flex: 1; padding: 35px 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 28px; scroll-behavior: smooth; position: relative; z-index: 11; }

        .bubble { 
            padding: 18px 28px; border-radius: 26px; background: rgba(255,255,255,0.04); 
            max-width: 80%; line-height: 1.6; font-size: 1.05rem; border: 1px solid rgba(255,255,255,0.06); 
            animation: liquidRise 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 1px 1px rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
        }
        
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--accent), #0055ff); color: white; border: none; border-bottom-right-radius: 6px; font-weight: 500; box-shadow: 0 10px 30px var(--accent-glow), inset 0 1px 2px rgba(255,255,255,0.4); }
        .ai-bubble { border-bottom-left-radius: 6px; }

        img { width: 100%; height: auto; max-height: 500px; object-fit: cover; border-radius: 18px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .ai-label { font-size: 0.65rem; font-weight: 900; letter-spacing: 2px; opacity: 0.6; margin-bottom: 8px; display: block; text-transform: uppercase; color: rgba(255,255,255,0.8); }

        .input-wrap { padding: 35px 40px; display: flex; justify-content: center; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; position: relative; z-index: 11; }
        
        #user-input { 
            width: 100%; max-width: 850px; padding: 22px 35px; 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 100px; color: white; font-size: 1.1rem; outline: none; 
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.4), 0 0 0 rgba(0,212,255,0); 
        }
        
        #user-input:focus { 
            border-color: var(--accent); background: rgba(255,255,255,0.08); 
            box-shadow: 0 0 40px var(--accent-glow), inset 0 2px 10px rgba(0,0,0,0.2); 
            transform: translateY(-2px);
        }
        #user-input:disabled { opacity: 0.4; cursor: not-allowed; transform: translateY(0); }
        
        .loading { border-color: var(--accent); animation: glowPulse 1.2s infinite alternate; }
        
        @keyframes liquidRise { from { opacity: 0; transform: translateY(25px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes glowPulse { from { box-shadow: 0 0 10px var(--accent-glow); } to { box-shadow: 0 0 35px var(--accent-glow); } }
    </style>
</head>
<body>

<div id="shell">
    <div id="top-bar">
        <span class="sys-title">DEEPSEEK CORE // HYPER-LIQUID</span>
        <button id="clear-btn" onclick="clearMemory()">PURGE CONTEXT</button>
    </div>
    
    <div id="chat"></div>
    
    <div class="input-wrap">
        <input type="text" id="user-input" placeholder="Message DeepSeek..." autocomplete="off" autofocus>
    </div>
</div>

<script>
    // ==========================================
    // PASTE YOUR GOOGLE SCRIPT URL HERE:
    // ==========================================
    const GOOGLE_BRIDGE_URL = "https://script.google.com/macros/s/AKfycbxl283x1Ut2EkMxEe6p-h4BoV9xemTDCQ6PhK7xTqdsqyEsTRojDHsii7ExHIb-IqSEhg/exec";
    
    const input = document.getElementById('user-input');
    const chat = document.getElementById('chat');
    
    let chatHistory = JSON.parse(localStorage.getItem('deepseekLiquidMemory')) || [];

    window.onload = () => {
        if (chatHistory.length === 0) {
            addMsg("SYSTEM", "DeepSeek reasoning engaged. Flux vision enabled. Network bypassed.", false, false, true);
        } else {
            chatHistory.forEach(msg => {
                if(msg.content !== "[Image Generated]") {
                    addMsg(msg.role === 'user' ? 'You' : 'DeepSeek', msg.content, msg.role === 'user', false, true);
                } else {
                    addMsg('DeepSeek', '[Image in previous session]', false, false, true);
                }
            });
            scrollChat();
        }
    };

    function saveMemory() { localStorage.setItem('deepseekLiquidMemory', JSON.stringify(chatHistory)); }
    function clearMemory() {
        if(confirm("Purge memory bank?")) {
            chatHistory = []; localStorage.removeItem('deepseekLiquidMemory'); chat.innerHTML = '';
            addMsg("SYSTEM", "Neural net purged. Ready.", false, false, true);
        }
    }

    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
            const prompt = input.value;
            input.value = '';
            
            input.disabled = true;
            input.placeholder = "DeepSeek is thinking...";
            
            chatHistory.push({ role: 'user', content: prompt });
            saveMemory();
            addMsg("You", prompt, true);
            
            const loader = addMsg("Engine", "Processing...", false, true);
            
            try {
                const lowerPrompt = prompt.toLowerCase();
                
                // --- HIGH-FIDELITY FLUX IMAGE ROUTE ---
                if (lowerPrompt.includes("draw") || lowerPrompt.includes("image") || lowerPrompt.includes("picture") || lowerPrompt.includes("generate")) {
                    
                    const qualityBoost = prompt + ", masterpiece, highly detailed, 8k resolution, cinematic lighting, stunning";
                    const safePrompt = encodeURIComponent(qualityBoost);
                    const randomSeed = Math.floor(Math.random() * 9999999);
                    
                    // Flux model strictly enforced here
                    const imageUrl = `https://image.pollinations.ai/prompt/${safePrompt}?seed=${randomSeed}&width=1024&height=1024&nologo=true&model=flux`;
                    
                    const img = new Image();
                    img.src = imageUrl;
                    
                    img.onload = () => {
                        loader.classList.remove("loading");
                        loader.innerHTML = `<span class="ai-label">VISION</span><img src="${imageUrl}">`;
                        chatHistory.push({ role: 'assistant', content: "[Image Generated]" });
                        saveMemory(); scrollChat(); unlockInput();
                    };
                    img.onerror = () => { throw new Error("Image Generation Blocked"); };
                } 
                
                // --- DEEPSEEK TEXT ROUTE VIA GOOGLE LOOPHOLE ---
                else {
                    const recentContext = chatHistory.slice(-5); 
                    const sysPrompt = "You are an incredibly smart AI assistant powered by DeepSeek. Be concise, highly logical, and helpful. CRITICAL: NEVER output promotional text, markdown links, or mention Pollinations.";
                    
                    const requestBody = {
                        messages: [
                            { role: 'system', content: sysPrompt },
                            ...recentContext
                        ],
                        model: "deepseek" // <-- This single line explicitly tells the API to route your prompt to DeepSeek
                    };

                    const response = await fetch(GOOGLE_BRIDGE_URL, {
                        method: 'POST',
                        body: JSON.stringify(requestBody) 
                    });
                    
                    if (!response.ok) throw new Error("Bridge Connection Failed");
                    
                    let text = await response.text();
                    
                    // Ad-Scrubber
                    text = text.replace(/^```html\n?|```$/g, '').trim(); 
                    text = text.replace(/(\n|^).*?(discord|pollinations|chat).*?(http|\.com|\.gg).*/gi, '').trim(); 
                    text = text.replace(/Join our Discord.*/gi, '').trim(); 
                    
                    loader.classList.remove("loading");
                    loader.innerHTML = `<span class="ai-label">DEEPSEEK</span>${text}`;
                    
                    chatHistory.push({ role: 'assistant', content: text });
                    saveMemory(); scrollChat(); unlockInput();
                }
            } catch (err) {
                loader.classList.remove("loading");
                loader.innerHTML = `<span class="ai-label" style="color: #ff4444;">ERROR</span>${err.message}.`;
                unlockInput();
            }
        }
    });

    function unlockInput() {
        input.disabled = false;
        input.placeholder = "Message DeepSeek...";
        setTimeout(() => input.focus(), 100);
    }

    function addMsg(sender, text, isUser = false, isLoading = false, skipAnimation = false) {
        const div = document.createElement('div');
        div.className = `bubble ${isUser ? 'user' : 'ai-bubble'} ${isLoading ? 'loading' : ''}`;
        if (skipAnimation) div.style.animation = 'none'; 
        div.innerHTML = `<span class="ai-label">${sender}</span>${text}`;
        chat.appendChild(div); scrollChat(); return div;
    }

    function scrollChat() { setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50); }
</script>

</body>
</html>
