<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiGPT | Stealth & Speed</title>
    
    <link rel="preconnect" href="https://text.pollinations.ai" crossorigin>
    <link rel="preconnect" href="https://image.pollinations.ai" crossorigin>

    <style>
        :root { 
            --bg-dark: #050505; --glass-bg: rgba(20, 20, 25, 0.45); 
            --glass-border: rgba(255, 255, 255, 0.08); --accent: #ff4500; 
            --accent-glow: rgba(255, 69, 0, 0.35); --text-main: #f0f0f0;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: radial-gradient(circle at 50% 50%, #1a1a1a, var(--bg-dark));
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            color: var(--text-main); display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        #shell { 
            width: 92vw; height: 90vh; max-width: 1200px; background: var(--glass-bg); 
            backdrop-filter: blur(40px) saturate(180%); border: 1px solid var(--glass-border); 
            border-radius: 35px; display: flex; flex-direction: column; 
            box-shadow: 0 30px 90px rgba(0,0,0,0.9); position: relative;
        }
        
        #top-bar {
            padding: 18px 35px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); background: rgba(0,0,0,0.2);
            border-top-left-radius: 35px; border-top-right-radius: 35px;
        }

        .sys-title { font-weight: 800; letter-spacing: 3px; font-size: 0.85rem; opacity: 0.8; color: var(--accent); }
        
        #clear-btn {
            background: rgba(255,255,255,0.03); color: var(--text-main); border: 1px solid var(--glass-border);
            padding: 8px 18px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; transition: 0.3s;
        }
        #clear-btn:hover { background: rgba(255,69,0,0.15); border-color: var(--accent); }

        #chat::-webkit-scrollbar { width: 6px; }
        #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        #chat { flex: 1; padding: 30px 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }

        .bubble { 
            padding: 18px 26px; border-radius: 24px; background: rgba(255,255,255,0.05); 
            max-width: 80%; line-height: 1.6; font-size: 1rem; border: 1px solid rgba(255,255,255,0.04); 
            animation: slideIn 0.2s ease forwards; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--accent), #ff7300); color: white; border-bottom-right-radius: 6px; border: none; }
        .ai-bubble { border-bottom-left-radius: 6px; }

        img { width: 100%; height: auto; max-height: 450px; object-fit: cover; border-radius: 16px; margin-top: 12px; }
        .ai-label { font-size: 0.65rem; font-weight: 800; letter-spacing: 1.5px; opacity: 0.6; margin-bottom: 8px; display: block; text-transform: uppercase; }

        .input-wrap { padding: 30px 40px; display: flex; justify-content: center; background: rgba(0,0,0,0.35); border-top: 1px solid var(--glass-border); border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; }
        #user-input { width: 100%; max-width: 800px; padding: 22px 35px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; color: white; font-size: 1.1rem; outline: none; transition: 0.3s; }
        #user-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.09); box-shadow: 0 0 30px var(--accent-glow); }
        
        .loading { border-color: var(--accent); animation: glowPulse 0.8s infinite alternate; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glowPulse { from { box-shadow: 0 0 5px var(--accent-glow); } to { box-shadow: 0 0 20px var(--accent-glow); } }
    </style>
</head>
<body>

<div id="shell">
    <div id="top-bar">
        <span class="sys-title">GROK // SPEED PROTOCOL</span>
        <button id="clear-btn" onclick="clearMemory()">WIPE CONTEXT</button>
    </div>
    <div id="chat"></div>
    <div class="input-wrap">
        <input type="text" id="user-input" placeholder="Message Grok..." autocomplete="off" autofocus>
    </div>
</div>

<script>
    const input = document.getElementById('user-input');
    const chat = document.getElementById('chat');
    let chatHistory = JSON.parse(localStorage.getItem('grokFastMemory')) || [];

    window.onload = () => {
        if (chatHistory.length === 0) {
            addMsg("SYSTEM", "Fast models engaged. Ad-blocker active. Ready.", false, false, true);
        } else {
            chatHistory.forEach(msg => addMsg(msg.role === 'user' ? 'You' : 'Grok', msg.content, msg.role === 'user', false, true));
            scrollChat();
        }
    };

    function saveMemory() { localStorage.setItem('grokFastMemory', JSON.stringify(chatHistory)); }
    function clearMemory() {
        chatHistory = []; localStorage.removeItem('grokFastMemory'); chat.innerHTML = '';
        addMsg("SYSTEM", "Memory wiped. Speed optimized.", false, false, true);
    }

    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
            const prompt = input.value;
            input.value = '';
            
            chatHistory.push({ role: 'user', content: prompt });
            saveMemory();
            addMsg("You", prompt, true);
            
            const loader = addMsg("Engine", "Generating...", false, true);
            
            try {
                const lowerPrompt = prompt.toLowerCase();
                
                // IMAGE ROUTE
                if (lowerPrompt.includes("draw") || lowerPrompt.includes("image") || lowerPrompt.includes("picture")) {
                    const safePrompt = encodeURIComponent(prompt);
                    const randomSeed = Math.floor(Math.random() * 1000000);
                    // Force fast model for images
                    const imageUrl = `https://image.pollinations.ai/prompt/${safePrompt}?seed=${randomSeed}&width=1024&height=1024&nologo=true&model=turbo`;
                    
                    const img = new Image(); img.src = imageUrl;
                    img.onload = () => {
                        loader.classList.remove("loading");
                        loader.innerHTML = `<span class="ai-label">VISION</span><img src="${imageUrl}">`;
                        chatHistory.push({ role: 'assistant', content: "[Image Generated]" });
                        saveMemory(); scrollChat();
                    };
                    img.onerror = () => { throw new Error("Blocked"); };
                } 
                // TEXT ROUTE
                else {
                    // Trim context to last 3 messages so it processes instantly
                    const recentContext = chatHistory.slice(-4); 
                    let contextString = "";
                    recentContext.forEach(m => { contextString += `${m.role === 'user' ? 'User' : 'Grok'}: ${m.content}\n`; });
                    
                    // Explicit instruction to not output promotional text
                    const sysPrompt = "You are Grok. Be concise, fast, and highly intelligent. CRITICAL: NEVER include links, discord URLs, promotional text, or mention Pollinations.";
                    const fullPromptForAPI = `${contextString}\nUser: ${prompt}`;

                    // SPEED FIX: Added '?model=llama' which processes 10x faster than the default
                    const directTextUrl = `https://text.pollinations.ai/prompt/${encodeURIComponent(fullPromptForAPI)}?system=${encodeURIComponent(sysPrompt)}&model=llama`;
                    
                    const response = await fetch(directTextUrl);
                    if (!response.ok) throw new Error("Connection dropped");
                    
                    let text = await response.text();
                    
                    // AD-BLOCKER FIX: Strip out injected text if the API ignores the system prompt
                    text = text.replace(/^```html\n?|```$/g, '').trim(); // Remove weird markdown
                    text = text.replace(/(\n|^).*?(discord|pollinations|chat).*?(http|\.com|\.gg).*/gi, '').trim(); // Delete promotional lines
                    text = text.replace(/Join our Discord.*/gi, '').trim(); // Fallback deletion
                    
                    loader.classList.remove("loading");
                    loader.innerHTML = `<span class="ai-label">GROK</span>${text}`;
                    
                    chatHistory.push({ role: 'assistant', content: text });
                    saveMemory(); scrollChat();
                }
            } catch (err) {
                loader.classList.remove("loading");
                loader.innerHTML = `<span class="ai-label" style="color: #ff4444;">ERROR</span>Network timeout.`;
            }
        }
    });

    function addMsg(sender, text, isUser = false, isLoading = false, skipAnimation = false) {
        const div = document.createElement('div');
        div.className = `bubble ${isUser ? 'user' : 'ai-bubble'} ${isLoading ? 'loading' : ''}`;
        if (skipAnimation) div.style.animation = 'none'; 
        div.innerHTML = `<span class="ai-label">${sender}</span>${text}`;
        chat.appendChild(div); scrollChat(); return div;
    }
    function scrollChat() { setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50); }
</script>

</body>
</html>
