<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MultiGPT | Grok Liquid</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root {
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #ff4500;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        #shell {
            width: 90vw; height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            display: flex; flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            position: relative;
        }

        #chat { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .bubble { padding: 18px 25px; border-radius: 25px; background: rgba(255,255,255,0.06); max-width: 80%; line-height: 1.6; }
        .user { align-self: flex-end; background: var(--accent); font-weight: 600; }
        
        .input-wrap { padding: 40px; display: flex; justify-content: center; border-top: 1px solid rgba(255,255,255,0.05); }
        #user-input { width: 100%; max-width: 700px; padding: 22px 35px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; color: white; font-size: 1.1rem; outline: none; transition: 0.3s; }
        #user-input:disabled { opacity: 0.3; cursor: not-allowed; }

        #auth-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; border-radius: 40px; backdrop-filter: blur(15px);
        }
        .btn { background: var(--accent); color: white; border: none; padding: 16px 45px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; box-shadow: 0 0 20px rgba(255,69,0,0.2); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 40px var(--accent); }
    </style>
</head>
<body>

<div id="shell">
    <div id="auth-overlay">
        <h2 style="letter-spacing: 2px;">MULTIGPT <span style="font-weight: 200;">x</span> GROK</h2>
        <p style="opacity: 0.7; margin-bottom: 30px;">Initialize via Puter.js (Zero-API Mode)</p>
        <button class="btn" onclick="initPuter()">LAUNCH INTERFACE</button>
        <p id="error-msg" style="color: #ff4444; margin-top: 20px; font-size: 0.9rem; display: none;">Connection failed. Ensure you are on a web server.</p>
    </div>

    <div id="chat">
        <div class="bubble"><b>Grok:</b> Connection established. The Liquid Glass interface is live. How can I help you?</div>
    </div>
    <div class="input-wrap">
        <input type="text" id="user-input" placeholder="Ask Grok Anything..." disabled>
    </div>
</div>

<script>
    const input = document.getElementById('user-input');
    const chat = document.getElementById('chat');
    const overlay = document.getElementById('auth-overlay');
    const errorMsg = document.getElementById('error-msg');

    async function initPuter() {
        try {
            // Check if user is already signed in
            if (!puter.auth.isSignedIn()) {
                await puter.auth.signIn();
            }
            overlay.style.display = 'none';
            input.disabled = false;
            input.focus();
        } catch (err) {
            console.error(err);
            errorMsg.style.display = 'block';
            errorMsg.innerText = "Error: Check if popups are blocked or if you're running locally.";
        }
    }

    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
            const val = input.value;
            input.value = '';
            addMsg("You", val, true);
            
            const loader = addMsg("Grok", "Thinking...");
            
            try {
                // Using the latest Grok 4.2 model available via Puter in April 2026
                const response = await puter.ai.chat(val, { 
                    model: 'x-ai/grok-4.2',
                    stream: false 
                });
                loader.innerHTML = `<b>Grok:</b> ${response.message.content}`;
            } catch (err) {
                loader.innerHTML = `<b>Error:</b> Could not reach Grok. Make sure your Puter account has active AI credits (Free tier reset daily).`;
            }
        }
    });

    function addMsg(sender, text, isUser = false) {
        const div = document.createElement('div');
        div.className = `bubble ${isUser ? 'user' : ''}`;
        div.innerHTML = `<b>${sender}:</b> ${text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }
</script>

</body>
</html>
